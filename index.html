<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hand Tracking Lite - Sem Lag</title>
    
    <!-- MediaPipe Hands CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            filter: brightness(0.9) contrast(1.05);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            pointer-events: none;
        }

        /* Interface minimalista */
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-family: monospace;
            z-index: 10;
            border-left: 3px solid #00ffcc;
            pointer-events: none;
        }

        .info span {
            color: #00ffcc;
            font-weight: bold;
            font-size: 18px;
        }

        .fps-counter {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            padding: 8px 15px;
            border-radius: 8px;
            color: #0f0;
            font-family: monospace;
            font-size: 14px;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
        }

        .start-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 18px 48px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(102, 126, 234, 0.8);
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }

        @media (max-width: 768px) {
            .info { font-size: 10px; padding: 8px 12px; }
            .info span { font-size: 14px; }
        }
    </style>
</head>
<body>

<div id="startPanel" class="start-panel">
    <button class="start-btn" id="startButton">🎥 ATIVAR CÂMERA</button>
</div>

<div class="container">
    <video id="inputVideo" autoplay playsinline muted></video>
    <canvas id="outputCanvas"></canvas>
</div>

<div class="info">
    ✋ MÃOS DETECTADAS: <span id="handCount">0</span>
</div>

<div class="fps-counter" id="fpsCounter">
    FPS: <span id="fpsValue">0</span>
</div>

<script>
    // Elementos DOM
    const videoElement = document.getElementById('inputVideo');
    const canvasElement = document.getElementById('outputCanvas');
    const ctx = canvasElement.getContext('2d');
    const startPanel = document.getElementById('startPanel');
    const startButton = document.getElementById('startButton');
    const handCountSpan = document.getElementById('handCount');
    const fpsValueSpan = document.getElementById('fpsValue');

    // Variáveis de performance
    let width = window.innerWidth;
    let height = window.innerHeight;
    let frameCount = 0;
    let lastFpsUpdate = performance.now();
    let lastFrameTime = performance.now();
    let fps = 0;
    
    // Cores para cada mão (fixas e leves)
    const handColors = [
        'rgba(0, 255, 200, 0.9)',   // Ciano
        'rgba(255, 100, 200, 0.9)'   // Rosa
    ];

    // Configuração do canvas
    function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvasElement.width = width;
        canvasElement.height = height;
    }

    window.addEventListener('resize', () => {
        resizeCanvas();
    });
    resizeCanvas();

    // Função otimizada para desenhar apenas as mãos
    function drawHands(landmarks) {
        if (!landmarks || landmarks.length === 0) return;
        
        // Limpa o canvas de forma eficiente
        ctx.clearRect(0, 0, width, height);
        
        // Desenha cada mão
        landmarks.forEach((hand, handIndex) => {
            const color = handColors[handIndex % handColors.length];
            
            // Desenha as conexões (ossos) da mão
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            // Usa as conexões padrão do MediaPipe
            for (const connection of HAND_CONNECTIONS) {
                const start = hand[connection[0]];
                const end = hand[connection[1]];
                
                if (start && end) {
                    const startX = start.x * width;
                    const startY = start.y * height;
                    const endX = end.x * width;
                    const endY = end.y * height;
                    
                    ctx.beginPath();
                    ctx.moveTo(startX, startY);
                    ctx.lineTo(endX, endY);
                    ctx.stroke();
                }
            }
            
            // Desenha os pontos (articulações)
            for (let i = 0; i < hand.length; i++) {
                const landmark = hand[i];
                const x = landmark.x * width;
                const y = landmark.y * height;
                
                // Pontos das pontas dos dedos maiores
                const isTip = [4, 8, 12, 16, 20].includes(i);
                const radius = isTip ? 6 : 3;
                
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, 2 * Math.PI);
                ctx.fillStyle = isTip ? '#ffffff' : color;
                ctx.fill();
                
                // Borda nos pontos principais
                if (isTip) {
                    ctx.beginPath();
                    ctx.arc(x, y, radius + 1, 0, 2 * Math.PI);
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            }
        });
    }

    // Função para detectar gesto simples (aberto/fechado)
    function detectSimpleGesture(hand) {
        if (!hand || hand.length < 21) return '';
        
        // Pega posição das pontas dos dedos e base
        const thumbTip = hand[4];
        const indexTip = hand[8];
        const middleTip = hand[12];
        const ringTip = hand[16];
        const pinkyTip = hand[20];
        
        const palmBase = hand[0];
        
        // Verifica se dedos estão estendidos (comparando Y, considerando que a mão pode estar em qualquer orientação)
        // Simplificação: verifica se a ponta está acima da base (em Y) - funciona bem para maioria das posições
        const fingersUp = [
            thumbTip.y < hand[3].y,     // Polegar
            indexTip.y < hand[6].y,     // Indicador
            middleTip.y < hand[10].y,   // Médio
            ringTip.y < hand[14].y,     // Anelar
            pinkyTip.y < hand[18].y     // Mindinho
        ];
        
        const upCount = fingersUp.filter(up => up).length;
        
        if (upCount >= 4) return '🖐️ ABERTA';
        if (upCount <= 1) return '✊ FECHADA';
        return '🤏 PARCIAL';
    }

    // Atualiza informações na UI
    function updateUI(hands) {
        const count = hands ? hands.length : 0;
        handCountSpan.textContent = count;
        
        if (count > 0 && hands[0]) {
            const gesture = detectSimpleGesture(hands[0]);
            // Opcional: mostrar gesto se quiser
            // document.getElementById('gesture').textContent = gesture;
        }
    }

    // Atualiza contador de FPS
    function updateFPS() {
        frameCount++;
        const now = performance.now();
        const delta = now - lastFpsUpdate;
        
        if (delta >= 1000) {
            fps = frameCount;
            fpsValueSpan.textContent = fps;
            frameCount = 0;
            lastFpsUpdate = now;
        }
    }

    // Inicializa o MediaPipe Hands
    function initHandTracking() {
        const hands = new Hands({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }
        });

        // Configuração OTIMIZADA para menor latência
        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 0,        // Menos complexo = mais rápido (0 = Lite, 1 = Full)
            minDetectionConfidence: 0.5,  // Menor confiança = detecção mais rápida
            minTrackingConfidence: 0.5    // Menor confiança = tracking mais rápido
        });

        // Callback quando as mãos são detectadas
        hands.onResults((results) => {
            const now = performance.now();
            const frameTime = now - lastFrameTime;
            lastFrameTime = now;
            
            if (results.multiHandLandmarks) {
                // Desenha as mãos
                drawHands(results.multiHandLandmarks);
                // Atualiza UI
                updateUI(results.multiHandLandmarks);
            } else {
                // Limpa o canvas se não houver mãos
                ctx.clearRect(0, 0, width, height);
                updateUI([]);
            }
            
            updateFPS();
        });

        // Configura a câmera
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 640,    // Resolução menor = mais performance
            height: 480,
            facingMode: 'user'
        });
        
        camera.start();
    }

    // Evento de início
    startButton.addEventListener('click', async () => {
        try {
            // Verifica permissão da câmera
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            videoElement.srcObject = stream;
            
            // Aguarda o vídeo carregar
            await new Promise((resolve) => {
                videoElement.onloadedmetadata = () => {
                    resolve();
                };
            });
            
            // Inicia o tracking
            initHandTracking();
            
            // Esconde o painel de início
            startPanel.classList.add('hidden');
            
        } catch (error) {
            console.error('Erro ao acessar câmera:', error);
            alert('Não foi possível acessar a câmera. Verifique as permissões.');
        }
    });

    // Pré-carregamento para melhor experiência
    console.log('Hand Tracking Lite - Pronto para iniciar');
</script>
</body>
</html>
