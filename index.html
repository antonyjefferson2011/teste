<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berço de Gato — Cordas de Luz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #020818;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  #container {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  /* Hidden video element — only used as source for MediaPipe */
  #inputVideo {
    display: none;
  }

  /* Main canvas covers full screen */
  #mainCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  /* CRT scanline overlay */
  #scanlines {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.18) 3px,
      rgba(0,0,0,0.18) 4px
    );
    z-index: 10;
  }

  /* Vignette */
  #vignette {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    background: radial-gradient(ellipse at center,
      transparent 50%,
      rgba(2, 8, 24, 0.85) 100%
    );
    z-index: 11;
  }

  /* UI overlay */
  #ui {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 20;
  }

  #title {
    position: absolute;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Orbitron', monospace;
    font-size: clamp(14px, 2.5vw, 22px);
    font-weight: 900;
    letter-spacing: 0.25em;
    color: #00f5ff;
    text-shadow:
      0 0 10px #00f5ff,
      0 0 30px #00f5ff88,
      0 0 60px #00f5ff44;
    white-space: nowrap;
  }

  #subtitle {
    position: absolute;
    top: 58px;
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(9px, 1.2vw, 12px);
    color: #00f5ff88;
    letter-spacing: 0.4em;
    white-space: nowrap;
  }

  #status {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: #ffffff55;
    letter-spacing: 0.2em;
    text-align: center;
  }

  #hands-count {
    position: absolute;
    top: 24px;
    right: 28px;
    font-size: 10px;
    color: #ff00ff88;
    letter-spacing: 0.2em;
  }

  #fps-display {
    position: absolute;
    top: 24px;
    left: 28px;
    font-size: 10px;
    color: #00ff8888;
    letter-spacing: 0.2em;
  }

  /* Permission overlay */
  #permission-screen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #020818;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 20px;
  }

  #permission-screen h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(20px, 4vw, 36px);
    font-weight: 900;
    color: #00f5ff;
    text-shadow: 0 0 20px #00f5ff, 0 0 60px #00f5ff55;
    letter-spacing: 0.2em;
    text-align: center;
  }

  #permission-screen p {
    color: #ffffff88;
    font-size: 14px;
    letter-spacing: 0.15em;
    max-width: 420px;
    text-align: center;
    line-height: 1.8;
  }

  #start-btn {
    margin-top: 20px;
    padding: 16px 48px;
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.3em;
    color: #020818;
    background: #00f5ff;
    border: none;
    cursor: pointer;
    position: relative;
    clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
    transition: all 0.2s;
    box-shadow: 0 0 30px #00f5ff88;
  }

  #start-btn:hover {
    background: #ff00ff;
    box-shadow: 0 0 40px #ff00ff99;
    transform: scale(1.05);
  }

  .grid-line {
    position: absolute;
    background: rgba(0, 245, 255, 0.04);
  }
  .grid-h { width: 100%; height: 1px; left: 0; }
  .grid-v { height: 100%; width: 1px; top: 0; }
</style>
</head>
<body>

<div id="container">
  <video id="inputVideo" playsinline></video>
  <canvas id="mainCanvas"></canvas>
  <div id="scanlines"></div>
  <div id="vignette"></div>

  <div id="ui">
    <div id="title">✦ BERÇO DE GATO ✦</div>
    <div id="subtitle">CORDAS DE LUZ INTERATIVAS</div>
    <div id="fps-display">FPS: --</div>
    <div id="hands-count">MÃOS: 0</div>
    <div id="status">APROXIME AS MÃOS PARA CRIAR CORDAS DE LUZ</div>
  </div>

  <div id="permission-screen">
    <!-- grid decoration -->
    <div class="grid-line grid-h" style="top:25%"></div>
    <div class="grid-line grid-h" style="top:75%"></div>
    <div class="grid-line grid-v" style="left:25%"></div>
    <div class="grid-line grid-v" style="left:75%"></div>

    <h1>BERÇO DE GATO</h1>
    <p>Uma experiência de realidade aumentada que transforma seus movimentos em cordas de luz neônicas.</p>
    <p style="color:#ff00ff88; font-size:12px;">Requer acesso à câmera</p>
    <button id="start-btn" onclick="startExperience()">INICIAR ▶</button>
  </div>
</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const video = document.getElementById('inputVideo');
const statusEl = document.getElementById('status');
const fpsEl = document.getElementById('fps-display');
const handsCountEl = document.getElementById('hands-count');

let W, H;
let handsData = [];
let particles = [];
let lastTime = performance.now();
let frameCount = 0;
let fps = 60;
let offscreenCam, offCtx; // for silhouette rendering

// Fingertip landmark indices
const FINGERTIPS = [4, 8, 12, 16, 20];
// All landmarks
const ALL_LANDMARKS = Array.from({length: 21}, (_, i) => i);

// Color palette
const COLORS = {
  cyan: '#00f5ff',
  magenta: '#ff00ff',
  yellow: '#ffe600',
  green: '#00ff88',
  red: '#ff3366',
};

// ─── Resize ──────────────────────────────────────────────────────────────────
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  offscreenCam = document.createElement('canvas');
  offscreenCam.width = W;
  offscreenCam.height = H;
  offCtx = offscreenCam.getContext('2d');
}
window.addEventListener('resize', resize);
resize();

// ─── Particle system ─────────────────────────────────────────────────────────
class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y;
    this.vx = (Math.random() - 0.5) * 8;
    this.vy = (Math.random() - 0.5) * 8;
    this.life = 1.0;
    this.decay = 0.02 + Math.random() * 0.03;
    this.size = 2 + Math.random() * 5;
    this.color = color;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= 0.92;
    this.vy *= 0.92;
    this.life -= this.decay;
  }
  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = this.life;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 20;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function spawnExplosion(x, y, color) {
  for (let i = 0; i < 28; i++) {
    particles.push(new Particle(x, y, color));
  }
}

// ─── Drawing helpers ─────────────────────────────────────────────────────────
function lerpColor(a, b, t) {
  // a, b: [r,g,b], t: 0-1
  return [
    Math.round(a[0] + (b[0] - a[0]) * t),
    Math.round(a[1] + (b[1] - a[1]) * t),
    Math.round(a[2] + (b[2] - a[2]) * t),
  ];
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return [r, g, b];
}

function rgbStr(arr, a = 1) {
  return `rgba(${arr[0]},${arr[1]},${arr[2]},${a})`;
}

function drawGlowDot(ctx, x, y, r, color, glowSize = 18) {
  ctx.save();
  ctx.shadowColor = color;
  ctx.shadowBlur = glowSize;
  // Outer glow ring
  ctx.beginPath();
  ctx.arc(x, y, r + 3, 0, Math.PI * 2);
  ctx.fillStyle = rgbStr(hexToRgb(color), 0.15);
  ctx.fill();
  // Core dot
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
  // White hot center
  ctx.shadowBlur = 4;
  ctx.beginPath();
  ctx.arc(x, y, r * 0.4, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.fill();
  ctx.restore();
}

function drawLaserString(ctx, x1, y1, x2, y2, dist, maxDist) {
  const t = Math.min(dist / maxDist, 1);

  // Color: cyan → magenta → yellow
  const cCyan = hexToRgb('#00f5ff');
  const cMag  = hexToRgb('#ff00ff');
  const cYel  = hexToRgb('#ffe600');

  let colorArr;
  if (t < 0.5) {
    colorArr = lerpColor(cCyan, cMag, t * 2);
  } else {
    colorArr = lerpColor(cMag, cYel, (t - 0.5) * 2);
  }
  const color = `rgb(${colorArr[0]},${colorArr[1]},${colorArr[2]})`;

  const thickness = Math.max(1, 3 - t * 2);

  // Glow layers
  const layers = [
    { blur: 30, alpha: 0.15, width: thickness * 6 },
    { blur: 15, alpha: 0.35, width: thickness * 3 },
    { blur:  6, alpha: 0.7,  width: thickness * 1.5 },
    { blur:  0, alpha: 1.0,  width: thickness },
  ];

  for (const layer of layers) {
    ctx.save();
    ctx.shadowColor = color;
    ctx.shadowBlur = layer.blur;
    ctx.strokeStyle = `rgba(${colorArr[0]},${colorArr[1]},${colorArr[2]},${layer.alpha})`;
    ctx.lineWidth = layer.width;
    ctx.lineCap = 'round';
    ctx.beginPath();
    // Slight curve using midpoint offset
    const mx = (x1 + x2) / 2 + (Math.random() - 0.5) * dist * 0.03;
    const my = (y1 + y2) / 2 + (Math.random() - 0.5) * dist * 0.03;
    ctx.moveTo(x1, y1);
    ctx.quadraticCurveTo(mx, my, x2, y2);
    ctx.stroke();
    ctx.restore();
  }

  return color;
}

function drawHandSkeleton(ctx, landmarks, color) {
  // Connections
  const connections = [
    [0,1],[1,2],[2,3],[3,4],       // thumb
    [0,5],[5,6],[6,7],[7,8],       // index
    [5,9],[9,10],[10,11],[11,12],  // middle
    [9,13],[13,14],[14,15],[15,16],// ring
    [13,17],[17,18],[18,19],[19,20],// pinky
    [0,17]                          // palm base
  ];
  ctx.save();
  ctx.strokeStyle = color + '44';
  ctx.lineWidth = 1;
  ctx.shadowColor = color;
  ctx.shadowBlur = 6;
  for (const [a, b] of connections) {
    const pa = landmarks[a];
    const pb = landmarks[b];
    ctx.beginPath();
    ctx.moveTo(pa.x * W, pa.y * H);
    ctx.lineTo(pb.x * W, pb.y * H);
    ctx.stroke();
  }
  ctx.restore();
}

// ─── Main draw loop ───────────────────────────────────────────────────────────
let prevTipPositions = {}; // for touch detection debounce
const touchCooldowns = {};

function draw(timestamp) {
  requestAnimationFrame(draw);

  // FPS
  frameCount++;
  if (timestamp - lastTime >= 1000) {
    fps = frameCount;
    frameCount = 0;
    lastTime = timestamp;
    fpsEl.textContent = `FPS: ${fps}`;
  }

  // Clear
  ctx.clearRect(0, 0, W, H);

  // Draw background — deep midnight blue
  ctx.fillStyle = '#020818';
  ctx.fillRect(0, 0, W, H);

  // Draw subtle grid
  ctx.save();
  ctx.strokeStyle = 'rgba(0,245,255,0.03)';
  ctx.lineWidth = 1;
  const gridSize = 60;
  for (let x = 0; x < W; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  ctx.restore();

  // Draw camera silhouette (dark blue-tinted)
  if (video.readyState >= 2) {
    offCtx.clearRect(0, 0, W, H);
    offCtx.save();
    offCtx.translate(W, 0);
    offCtx.scale(-1, 1);
    offCtx.drawImage(video, 0, 0, W, H);
    offCtx.restore();
    // Tint the camera frame dark
    ctx.save();
    ctx.globalAlpha = 0.18;
    ctx.drawImage(offscreenCam, 0, 0);
    ctx.globalAlpha = 1;
    // Dark overlay
    ctx.fillStyle = 'rgba(2,8,24,0.55)';
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  const hands = handsData;
  handsCountEl.textContent = `MÃOS: ${hands.length}`;

  // Categorize hands
  let leftHand = null, rightHand = null;
  for (const h of hands) {
    // MediaPipe labels are from the camera's perspective (mirrored)
    if (h.handedness === 'Left') rightHand = h;
    else leftHand = h;
  }

  // Draw skeletons
  if (leftHand) drawHandSkeleton(ctx, leftHand.landmarks, '#00f5ff');
  if (rightHand) drawHandSkeleton(ctx, rightHand.landmarks, '#ff00ff');

  // Draw landmark dots
  for (const h of hands) {
    const isTip = (i) => FINGERTIPS.includes(i);
    const color = h.handedness === 'Left' ? '#ff00ff' : '#00f5ff';
    for (let i = 0; i < h.landmarks.length; i++) {
      const lm = h.landmarks[i];
      const x = lm.x * W;
      const y = lm.y * H;
      const r = isTip(i) ? 7 : 4;
      const glow = isTip(i) ? 24 : 12;
      drawGlowDot(ctx, x, y, r, isTip(i) ? color : color + 'aa', glow);
    }
  }

  // Draw strings between hands
  if (leftHand && rightHand) {
    for (let fi = 0; fi < FINGERTIPS.length; fi++) {
      const li = FINGERTIPS[fi];
      const lLm = leftHand.landmarks[li];
      const rLm = rightHand.landmarks[li];

      const lx = lLm.x * W, ly = lLm.y * H;
      const rx = rLm.x * W, ry = rLm.y * H;

      const dist = Math.hypot(rx - lx, ry - ly);
      const maxDist = Math.hypot(W, H) * 0.8;

      const color = drawLaserString(ctx, lx, ly, rx, ry, dist, maxDist);

      // Touch detection
      const key = `tip_${fi}`;
      if (!touchCooldowns[key]) touchCooldowns[key] = 0;

      if (dist < 40 && touchCooldowns[key] <= 0) {
        spawnExplosion((lx + rx) / 2, (ly + ry) / 2, color);
        touchCooldowns[key] = 30; // frames cooldown
      }
      if (touchCooldowns[key] > 0) touchCooldowns[key]--;
    }
  }

  // Update + draw particles
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.update();
    p.draw(ctx);
  }

  // Status message
  if (hands.length === 0) {
    statusEl.textContent = 'MOSTRE SUAS MÃOS PARA A CÂMERA';
  } else if (hands.length === 1) {
    statusEl.textContent = 'MOSTRE AMBAS AS MÃOS PARA CRIAR CORDAS';
  } else {
    statusEl.textContent = 'APROXIME OS DEDOS PARA CRIAR EXPLOSÕES ✦';
  }
}

// ─── MediaPipe setup ──────────────────────────────────────────────────────────
function startExperience() {
  document.getElementById('permission-screen').style.display = 'none';

  const hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
  });

  hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.6,
  });

  hands.onResults((results) => {
    handsData = [];
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
      for (let i = 0; i < results.multiHandLandmarks.length; i++) {
        handsData.push({
          landmarks: results.multiHandLandmarks[i],
          handedness: results.multiHandedness[i].label,
        });
      }
    }
  });

  const camera = new Camera(video, {
    onFrame: async () => {
      await hands.send({ image: video });
    },
    width: 1280,
    height: 720,
    facingMode: 'user',
  });

  camera.start().catch(err => {
    document.getElementById('permission-screen').style.display = 'flex';
    document.getElementById('permission-screen').querySelector('p').textContent =
      'Erro ao acessar a câmera: ' + err.message;
  });

  requestAnimationFrame(draw);
}
</script>
</body>
</html>
