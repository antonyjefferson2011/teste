<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐍 SNAKE JEFF - Siga seu Dedo</title>
    
    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #0a2a0a 100%);
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            filter: brightness(0.4);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            pointer-events: none;
        }

        /* Interface */
        .jeff-title {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            padding: 10px 30px;
            border-radius: 50px;
            color: #00ff00;
            font-size: 28px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 20px #00ff00;
            z-index: 20;
            letter-spacing: 4px;
            white-space: nowrap;
            border: 2px solid #00ff00;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 10px #00ff00; }
            50% { box-shadow: 0 0 30px #00ff00; }
        }

        .score-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 12px;
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
            font-family: monospace;
            z-index: 20;
            border-right: 3px solid #00ff00;
            border-bottom: 1px solid #00ff00;
        }

        .score-panel span {
            color: #00ff00;
            font-size: 32px;
        }

        .instruction {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 10px 18px;
            border-radius: 12px;
            color: #00ff00;
            font-size: 14px;
            font-family: monospace;
            z-index: 20;
            border-left: 3px solid #00ff00;
            pointer-events: none;
        }

        .instruction-right {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 10px 18px;
            border-radius: 12px;
            color: #ffaa00;
            font-size: 14px;
            font-family: monospace;
            z-index: 20;
            text-align: right;
            pointer-events: none;
        }

        .start-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            flex-direction: column;
            gap: 30px;
        }

        .start-btn {
            background: linear-gradient(135deg, #00ff00, #008800);
            border: none;
            color: #000;
            padding: 18px 48px;
            font-size: 20px;
            font-weight: bold;
            font-family: monospace;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.5);
        }

        .start-btn:hover {
            transform: scale(1.05);
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }

        .comida {
            position: fixed;
            width: 20px;
            height: 20px;
            background: red;
            border-radius: 50%;
            z-index: 25;
            pointer-events: none;
            box-shadow: 0 0 15px red;
            transition: all 0.1s ease;
        }
    </style>
</head>
<body>

<div id="startPanel" class="start-panel">
    <h1 class="jeff-title" style="position: relative; top: auto; left: auto; transform: none;">🐍 SNAKE JEFF</h1>
    <p style="color: #00ff00;">A cobra segue o seu DEDO INDICADOR!</p>
    <button class="start-btn" id="startButton">🎮 COMEÇAR</button>
</div>

<div class="container">
    <video id="inputVideo" autoplay playsinline muted></video>
    <canvas id="outputCanvas"></canvas>
</div>

<div class="jeff-title">🐍 JEFF'S SNAKE TRACKER 🐍</div>
<div class="score-panel">🍎 COMIDAS: <span id="score">0</span></div>
<div class="instruction">
    👆 DEDO INDICADOR = CABEÇA DA COBRA<br>
    🐍 O CORPO SEGUE O CAMINHO DO SEU DEDO
</div>
<div class="instruction-right">
    🎯 ENCOSTE NO PONTO VERMELHO!<br>
    🔥 QUANTO MAIOR A COBRA, MAIS DIFÍCIL
</div>

<div id="comida" class="comida"></div>

<script>
    const videoElement = document.getElementById('inputVideo');
    const canvasElement = document.getElementById('outputCanvas');
    const ctx = canvasElement.getContext('2d');
    const startPanel = document.getElementById('startPanel');
    const startButton = document.getElementById('startButton');
    const scoreSpan = document.getElementById('score');
    const comidaDiv = document.getElementById('comida');

    let width = window.innerWidth;
    let height = window.innerHeight;
    
    // Cobra = array de posições (rastro do dedo)
    let snakeBody = []; // Cada posição = {x, y}
    let snakeLength = 5; // Começa com 5 segmentos
    let score = 0;
    
    // Posição da comida
    let foodX = 300;
    let foodY = 300;
    
    // Posição atual do dedo
    let currentFingerX = width / 2;
    let currentFingerY = height / 2;
    let fingerPresent = false;
    
    // Controle para não adicionar pontos muito rápido
    let lastEatTime = 0;
    
    // Cores da cobra (gradiente)
    let snakeColors = ['#00ff00', '#33ff33', '#66ff66', '#99ff99', '#ccffcc'];
    
    function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvasElement.width = width;
        canvasElement.height = height;
        
        // Reposicionar comida se estiver fora
        if (foodX > width - 30) foodX = width - 50;
        if (foodY > height - 30) foodY = height - 50;
        if (foodX < 20) foodX = 50;
        if (foodY < 20) foodY = 50;
        
        updateComidaPosition();
    }
    
    function updateComidaPosition() {
        comidaDiv.style.left = (foodX - 10) + 'px';
        comidaDiv.style.top = (foodY - 10) + 'px';
    }
    
    window.addEventListener('resize', () => {
        resizeCanvas();
    });
    
    // Gerar nova comida em posição aleatória (longe da cobra)
    function generateRandomFood() {
        let newX, newY;
        let attempts = 0;
        let farFromSnake = false;
        
        do {
            newX = 50 + Math.random() * (width - 100);
            newY = 50 + Math.random() * (height - 100);
            farFromSnake = true;
            
            // Verificar se está longe da cabeça da cobra
            if (snakeBody.length > 0) {
                const head = snakeBody[0];
                const distToHead = Math.hypot(newX - head.x, newY - head.y);
                if (distToHead < 100) farFromSnake = false;
            }
            
            attempts++;
            if (attempts > 50) break;
        } while (!farFromSnake);
        
        foodX = newX;
        foodY = newY;
        updateComidaPosition();
    }
    
    // Verificar se comeu a comida
    function checkEat() {
        if (!fingerPresent) return false;
        
        const distToFood = Math.hypot(currentFingerX - foodX, currentFingerY - foodY);
        
        if (distToFood < 25) { // Distância para comer
            const now = Date.now();
            if (now - lastEatTime > 200) { // Evitar comer múltiplas vezes
                lastEatTime = now;
                score++;
                scoreSpan.textContent = score;
                snakeLength += 2; // Aumenta o tamanho da cobra
                generateRandomFood();
                
                // Efeito visual na comida
                comidaDiv.style.transform = 'scale(1.5)';
                setTimeout(() => comidaDiv.style.transform = 'scale(1)', 150);
                
                return true;
            }
        }
        return false;
    }
    
    // Atualizar corpo da cobra (o rastro segue o dedo)
    function updateSnakeBody() {
        if (!fingerPresent) return;
        
        // Adicionar posição atual do dedo no início do array
        snakeBody.unshift({ x: currentFingerX, y: currentFingerY });
        
        // Manter apenas o tamanho atual da cobra
        while (snakeBody.length > snakeLength) {
            snakeBody.pop();
        }
    }
    
    // Verificar auto-colisão (se a cabeça encostou no corpo)
    function checkSelfCollision() {
        if (snakeBody.length < 10) return false;
        
        const head = snakeBody[0];
        
        for (let i = 5; i < snakeBody.length; i++) { // Começa do 5 pra ignorar a região da cabeça
            const segment = snakeBody[i];
            const dist = Math.hypot(head.x - segment.x, head.y - segment.y);
            if (dist < 15) {
                return true;
            }
        }
        return false;
    }
    
    // Desenhar tudo
    function draw() {
        if (!ctx) return;
        
        // Limpar canvas com fade (efeito de rastro legal)
        ctx.fillStyle = 'rgba(10, 10, 10, 0.2)';
        ctx.fillRect(0, 0, width, height);
        
        // Desenhar o caminho da cobra (rastro brilhante)
        for (let i = 0; i < snakeBody.length; i++) {
            const segment = snakeBody[i];
            const opacity = 1 - (i / snakeLength) * 0.7;
            const size = 16 - (i / snakeLength) * 8;
            const colorIndex = Math.min(Math.floor(i / 3), snakeColors.length - 1);
            
            ctx.beginPath();
            ctx.arc(segment.x, segment.y, Math.max(size, 6), 0, 2 * Math.PI);
            
            // Gradiente radial para cada segmento
            const gradient = ctx.createRadialGradient(segment.x, segment.y, 0, segment.x, segment.y, size);
            gradient.addColorStop(0, snakeColors[colorIndex]);
            gradient.addColorStop(1, '#006600');
            
            ctx.fillStyle = gradient;
            ctx.globalAlpha = opacity;
            ctx.fill();
            
            // Brilho nos segmentos
            ctx.beginPath();
            ctx.arc(segment.x, segment.y, size/2, 0, 2 * Math.PI);
            ctx.fillStyle = '#aaffaa';
            ctx.globalAlpha = opacity * 0.5;
            ctx.fill();
        }
        
        ctx.globalAlpha = 1;
        
        // Desenhar olhos na cabeça (se existir)
        if (snakeBody.length > 0) {
            const head = snakeBody[0];
            ctx.beginPath();
            ctx.arc(head.x - 4, head.y - 4, 3, 0, 2 * Math.PI);
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(head.x + 4, head.y - 4, 3, 0, 2 * Math.PI);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(head.x - 4, head.y - 4, 1.5, 0, 2 * Math.PI);
            ctx.fillStyle = 'black';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(head.x + 4, head.y - 4, 1.5, 0, 2 * Math.PI);
            ctx.fill();
            
            // Língua (efeito)
            ctx.beginPath();
            ctx.moveTo(head.x, head.y + 2);
            ctx.lineTo(head.x - 3, head.y + 8);
            ctx.lineTo(head.x + 3, head.y + 8);
            ctx.fillStyle = '#ff4444';
            ctx.fill();
        }
        
        // Desenhar anel ao redor do dedo
        if (fingerPresent) {
            ctx.beginPath();
            ctx.arc(currentFingerX, currentFingerY, 20, 0, 2 * Math.PI);
            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 3;
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // Linha de mira para a comida
            ctx.beginPath();
            ctx.moveTo(currentFingerX, currentFingerY);
            ctx.lineTo(foodX, foodY);
            ctx.strokeStyle = 'rgba(0, 255, 0, 0.3)';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
        
        // Brilho na comida
        ctx.beginPath();
        ctx.arc(foodX, foodY, 15, 0, 2 * Math.PI);
        ctx.fillStyle = 'rgba(255, 0, 0, 0.3)';
        ctx.fill();
    }
    
    // Desenhar mãos do MediaPipe
    function drawHands(landmarks) {
        if (!landmarks || landmarks.length === 0) {
            fingerPresent = false;
            return;
        }
        
        // Pegar o dedo indicador (ponto 8)
        const indexFinger = landmarks[0][8];
        if (indexFinger) {
            // Converter coordenadas normalizadas para tela (levando em conta espelhamento)
            let fingerX = indexFinger.x * width;
            let fingerY = indexFinger.y * height;
            
            // Inverter X por causa do espelhamento do video
            fingerX = width - fingerX;
            
            currentFingerX = fingerX;
            currentFingerY = fingerY;
            fingerPresent = true;
            
            // Verificar colisão com comida primeiro
            checkEat();
            
            // Atualizar corpo da cobra
            updateSnakeBody();
            
            // Verificar auto-colisão
            if (checkSelfCollision() && snakeBody.length > 15) {
                // Resetar o jogo se colidir (opcional)
                snakeLength = 5;
                score = 0;
                scoreSpan.textContent = score;
                snakeBody = [];
                generateRandomFood();
            }
        }
        
        // Desenhar esqueleto da mão (opcional, pra debug)
        for (const hand of landmarks) {
            for (const connection of HAND_CONNECTIONS) {
                const start = hand[connection[0]];
                const end = hand[connection[1]];
                if (start && end) {
                    let startX = start.x * width;
                    let startY = start.y * height;
                    let endX = end.x * width;
                    let endY = end.y * height;
                    
                    // Inverter X
                    startX = width - startX;
                    endX = width - endX;
                    
                    ctx.beginPath();
                    ctx.moveTo(startX, startY);
                    ctx.lineTo(endX, endY);
                    ctx.strokeStyle = 'rgba(0, 255, 0, 0.3)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            }
        }
        
        draw();
    }
    
    // Inicializar MediaPipe
    function initHandTracking() {
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });
        
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 0,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.5
        });
        
        hands.onResults((results) => {
            drawHands(results.multiHandLandmarks);
        });
        
        const camera = new Camera(videoElement, {
            onFrame: async () => await hands.send({ image: videoElement }),
            width: 640,
            height: 480,
            facingMode: 'user'
        });
        
        camera.start();
    }
    
    // Loop de animação
    function animate() {
        draw();
        requestAnimationFrame(animate);
    }
    
    // Evento de início
    startButton.addEventListener('click', async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            videoElement.srcObject = stream;
            await new Promise(resolve => videoElement.onloadedmetadata = resolve);
            
            resizeCanvas();
            initHandTracking();
            animate();
            
            // Iniciar com uma cobra pequena
            snakeLength = 5;
            score = 0;
            scoreSpan.textContent = score;
            snakeBody = [];
            generateRandomFood();
            
            startPanel.classList.add('hidden');
            
        } catch (error) {
            alert('Erro ao acessar câmera. Verifique as permissões.');
        }
    });
    
    resizeCanvas();
    updateComidaPosition();
    
    console.log('🐍 SNAKE JEFF - Mova seu dedo indicador! A cobra segue você!');
</script>
</body>
</html>
