<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎹 Piano Virtual - Toque com as Mãos</title>
    
    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            filter: brightness(0.7);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            pointer-events: none;
        }

        /* Piano na parte inferior */
        .piano-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 15px;
            z-index: 20;
            border-top: 2px solid rgba(255, 255, 255, 0.2);
        }

        .piano {
            display: flex;
            justify-content: center;
            gap: 4px;
            flex-wrap: wrap;
            max-width: 100%;
            overflow-x: auto;
            padding: 10px;
        }

        .key {
            width: 60px;
            height: 160px;
            background: white;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 15px;
            cursor: pointer;
            transition: all 0.05s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 2px solid #ddd;
        }

        .key.black {
            background: #1a1a1a;
            color: white;
            width: 45px;
            height: 100px;
            margin-left: -22px;
            margin-right: -22px;
            z-index: 10;
        }

        .key.active {
            background: #ff6b6b;
            transform: scale(0.95);
            box-shadow: 0 0 20px #ff6b6b;
        }

        .key span {
            font-size: 14px;
            font-weight: bold;
        }

        .key .note {
            font-size: 12px;
            color: #666;
        }

        .key.black .note {
            color: #aaa;
        }

        /* Interface */
        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            z-index: 30;
            border-left: 3px solid #ff6b6b;
            pointer-events: none;
        }

        .instruction {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 10px 18px;
            border-radius: 20px;
            color: #ffd700;
            font-size: 12px;
            z-index: 30;
            text-align: right;
            pointer-events: none;
        }

        .start-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s;
            flex-direction: column;
            gap: 20px;
        }

        .start-btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border: none;
            color: white;
            padding: 18px 48px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .start-btn:hover {
            transform: scale(1.05);
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }

        @media (max-width: 768px) {
            .key { width: 45px; height: 120px; }
            .key.black { width: 35px; height: 80px; }
            .key span { font-size: 10px; }
        }
    </style>
</head>
<body>

<div id="startPanel" class="start-panel">
    <h1 style="color: white;">🎹 Piano Virtual</h1>
    <p style="color: #ccc;">Toque o piano com os dedos!</p>
    <button class="start-btn" id="startButton">🎵 ATIVAR CÂMERA</button>
</div>

<div class="container">
    <video id="inputVideo" autoplay playsinline muted></video>
    <canvas id="outputCanvas"></canvas>
</div>

<div class="piano-container" id="pianoContainer" style="display: none;">
    <div class="piano" id="piano"></div>
</div>

<div class="info">
    🎹 Piano Virtual | Dedo indicador toca as teclas
</div>

<div class="instruction">
    ✋ Mostre o dedo indicador<br>
    👆 Encoste na tecla virtual<br>
    🎵 Aproxime a mão do piano
</div>

<script>
    const videoElement = document.getElementById('inputVideo');
    const canvasElement = document.getElementById('outputCanvas');
    const ctx = canvasElement.getContext('2d');
    const startPanel = document.getElementById('startPanel');
    const startButton = document.getElementById('startButton');
    const pianoContainer = document.getElementById('pianoContainer');

    let width = window.innerWidth;
    let height = window.innerHeight;
    
    // Configurações do piano
    const notes = ['C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4', 'C5'];
    const noteNames = ['Dó', 'Ré', 'Mi', 'Fá', 'Sol', 'Lá', 'Si', 'Dó'];
    const keysElements = [];
    
    // Áudio
    let audioContext = null;
    let isAudioReady = false;
    
    // Controle de notas tocadas
    let lastPlayedKey = null;
    let lastPlayedTime = 0;
    
    // Posição do piano na tela
    let pianoRect = { x: 0, y: 0, width: 0, height: 0 };
    
    function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvasElement.width = width;
        canvasElement.height = height;
        updatePianoPosition();
    }
    
    function updatePianoPosition() {
        const piano = document.querySelector('.piano');
        if (piano) {
            const rect = piano.getBoundingClientRect();
            pianoRect = {
                x: rect.left,
                y: rect.top,
                width: rect.width,
                height: rect.height
            };
        }
    }
    
    window.addEventListener('resize', () => {
        resizeCanvas();
        setTimeout(updatePianoPosition, 100);
    });
    
    // Criar piano visual
    function createPiano() {
        const pianoDiv = document.getElementById('piano');
        pianoDiv.innerHTML = '';
        
        notes.forEach((note, index) => {
            const key = document.createElement('div');
            key.className = 'key';
            key.dataset.note = note;
            key.dataset.index = index;
            
            const noteSpan = document.createElement('span');
            noteSpan.textContent = noteNames[index];
            const noteName = document.createElement('div');
            noteName.className = 'note';
            noteName.textContent = note;
            
            key.appendChild(noteSpan);
            key.appendChild(noteName);
            
            key.addEventListener('click', () => playNote(note, index));
            pianoDiv.appendChild(key);
            keysElements.push(key);
            
            // Adicionar teclas pretas (sustenidos - entre algumas notas)
            if (index === 0 || index === 1 || index === 3 || index === 4 || index === 5) {
                const blackKey = document.createElement('div');
                blackKey.className = 'key black';
                const blackNote = note + '#';
                blackKey.dataset.note = blackNote;
                blackKey.innerHTML = '<span>♯</span><div class="note">' + blackNote + '</div>';
                blackKey.addEventListener('click', () => playNote(blackNote, index));
                pianoDiv.appendChild(blackKey);
                keysElements.push(blackKey);
            }
        });
        
        setTimeout(updatePianoPosition, 100);
    }
    
    // Tocar uma nota
    function playNote(note, index) {
        if (!audioContext || !isAudioReady) return;
        
        const now = audioContext.currentTime;
        
        // Evitar tocar a mesma nota muitas vezes seguidas
        if (lastPlayedKey === index && now - lastPlayedTime < 0.05) return;
        
        lastPlayedKey = index;
        lastPlayedTime = now;
        
        // Frequências das notas (C4 = 261.63 Hz)
        const frequencies = {
            'C4': 261.63, 'C4#': 277.18,
            'D4': 293.66, 'D4#': 311.13,
            'E4': 329.63,
            'F4': 349.23, 'F4#': 369.99,
            'G4': 392.00, 'G4#': 415.30,
            'A4': 440.00, 'A4#': 466.16,
            'B4': 493.88,
            'C5': 523.25
        };
        
        const freq = frequencies[note];
        if (!freq) return;
        
        // Criar oscilador
        const osc = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        osc.type = 'sine';
        osc.frequency.value = freq;
        
        gainNode.gain.setValueAtTime(0.3, now);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 1);
        
        osc.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        osc.start();
        osc.stop(now + 1);
        
        // Efeito visual na tecla
        const key = keysElements.find(k => k.dataset.note === note);
        if (key) {
            key.classList.add('active');
            setTimeout(() => key.classList.remove('active'), 150);
        }
    }
    
    // Inicializar áudio (precisa de interação do usuário)
    function initAudio() {
        if (audioContext) return;
        
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        isAudioReady = true;
        
        // Tocar um som de teste para "ativar" o áudio
        const testOsc = audioContext.createOscillator();
        const testGain = audioContext.createGain();
        testOsc.connect(testGain);
        testGain.connect(audioContext.destination);
        testGain.gain.value = 0.05;
        testOsc.start();
        testOsc.stop(audioContext.currentTime + 0.1);
    }
    
    // Desenhar mãos
    function drawHands(landmarks) {
        ctx.clearRect(0, 0, width, height);
        
        if (!landmarks || landmarks.length === 0) return;
        
        landmarks.forEach((hand, handIndex) => {
            const color = handIndex === 0 ? 'rgba(0, 255, 200, 0.8)' : 'rgba(255, 100, 200, 0.8)';
            
            // Desenhar conexões
            for (const connection of HAND_CONNECTIONS) {
                const start = hand[connection[0]];
                const end = hand[connection[1]];
                if (start && end) {
                    ctx.beginPath();
                    ctx.moveTo(start.x * width, start.y * height);
                    ctx.lineTo(end.x * width, end.y * height);
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 2.5;
                    ctx.stroke();
                }
            }
            
            // Desenhar pontos
            for (let i = 0; i < hand.length; i++) {
                const x = hand[i].x * width;
                const y = hand[i].y * height;
                const isTip = [4, 8, 12, 16, 20].includes(i);
                const radius = isTip ? 6 : 3;
                
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, 2 * Math.PI);
                ctx.fillStyle = isTip ? '#ff6b6b' : color;
                ctx.fill();
            }
            
            // Verificar se o dedo indicador (ponto 8) está tocando alguma tecla do piano
            const indexTip = hand[8];
            if (indexTip) {
                const fingerX = indexTip.x * width;
                const fingerY = indexTip.y * height;
                
                // Desenhar um círculo ao redor do dedo indicador
                ctx.beginPath();
                ctx.arc(fingerX, fingerY, 15, 0, 2 * Math.PI);
                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Verificar colisão com o piano
                if (fingerY > pianoRect.y && fingerY < pianoRect.y + pianoRect.height) {
                    // Verificar qual tecla está sendo apontada
                    const keys = document.querySelectorAll('.key');
                    for (let i = 0; i < keys.length; i++) {
                        const key = keys[i];
                        const keyRect = key.getBoundingClientRect();
                        
                        if (fingerX >= keyRect.left && fingerX <= keyRect.right) {
                            // Tocar a nota
                            const note = key.dataset.note;
                            if (note) {
                                // Adicionar efeito visual extra
                                key.classList.add('active');
                                setTimeout(() => key.classList.remove('active'), 100);
                                playNote(note, i);
                            }
                            break;
                        }
                    }
                }
            }
        });
    }
    
    // Inicializar MediaPipe
    function initHandTracking() {
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });
        
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 0,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.5
        });
        
        hands.onResults((results) => {
            drawHands(results.multiHandLandmarks);
        });
        
        const camera = new Camera(videoElement, {
            onFrame: async () => await hands.send({ image: videoElement }),
            width: 640,
            height: 480,
            facingMode: 'user'
        });
        
        camera.start();
    }
    
    // Evento de início
    startButton.addEventListener('click', async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            videoElement.srcObject = stream;
            await new Promise(resolve => videoElement.onloadedmetadata = resolve);
            
            createPiano();
            initAudio();
            initHandTracking();
            resizeCanvas();
            
            startPanel.classList.add('hidden');
            pianoContainer.style.display = 'block';
            
            // Atualizar posição do piano periodicamente
            setInterval(updatePianoPosition, 1000);
        } catch (error) {
            alert('Erro ao acessar câmera. Verifique as permissões.');
        }
    });
    
    // Pré-carregar
    console.log('🎹 Piano Virtual - Aponte o dedo indicador para as teclas!');
</script>
</body>
</html>
