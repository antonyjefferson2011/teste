<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jujutsu Kaisen — Cursed Energy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Bebas+Neue&display=swap');

  :root {
    --purple: #6a0dad;
    --blue: #0a0a2e;
    --cyan: #00f0ff;
    --red: #ff2244;
    --gold: #ffd700;
    --white: #f0eaf8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--blue);
    color: var(--white);
    font-family: 'Noto Serif JP', serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Background cursed energy lines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 50%, rgba(106,13,173,0.18) 0%, transparent 70%),
      repeating-linear-gradient(45deg, rgba(106,13,173,0.04) 0px, rgba(106,13,173,0.04) 1px, transparent 1px, transparent 60px),
      repeating-linear-gradient(-45deg, rgba(0,240,255,0.03) 0px, rgba(0,240,255,0.03) 1px, transparent 1px, transparent 60px);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 10;
    background: linear-gradient(180deg, rgba(10,10,46,0.95), transparent);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 4px;
    background: linear-gradient(90deg, var(--cyan), var(--purple), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
    filter: drop-shadow(0 0 8px rgba(0,240,255,0.5));
  }

  .subtitle {
    font-size: 0.65rem;
    letter-spacing: 6px;
    color: rgba(240,234,248,0.5);
    text-transform: uppercase;
  }

  /* Main layout */
  .main {
    position: relative;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    height: 100vh;
  }

  /* Camera */
  #video-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  #webcam {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    opacity: 0.7;
  }

  #canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  /* Overlay UI */
  #overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 20;
  }

  /* HUD corners */
  .hud-corner {
    position: absolute;
    width: 60px;
    height: 60px;
    border-color: var(--cyan);
    border-style: solid;
    opacity: 0.7;
  }
  .hud-corner.tl { top:70px; left:16px; border-width: 2px 0 0 2px; }
  .hud-corner.tr { top:70px; right:16px; border-width: 2px 2px 0 0; }
  .hud-corner.bl { bottom:16px; left:16px; border-width: 0 0 2px 2px; }
  .hud-corner.br { bottom:16px; right:16px; border-width: 0 2px 2px 0; }

  /* Power panel */
  #power-panel {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: all;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 0 12px;
  }

  .power-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    user-select: none;
    transition: transform 0.2s;
  }

  .power-btn:hover .power-icon { filter: brightness(1.5) drop-shadow(0 0 12px currentColor); }
  .power-btn:active { transform: scale(0.93); }

  .power-icon {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    border: 2px solid;
    transition: all 0.3s;
    background: rgba(10,10,46,0.7);
    backdrop-filter: blur(4px);
  }

  .power-label {
    font-size: 0.55rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(240,234,248,0.7);
    text-align: center;
    max-width: 65px;
  }

  /* Technique display */
  #technique-display {
    position: absolute;
    top: 80px;
    left: 0; right: 0;
    text-align: center;
    pointer-events: none;
  }

  #technique-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 6vw, 4rem);
    letter-spacing: 6px;
    opacity: 0;
    transition: opacity 0.3s;
    line-height: 1;
  }

  #technique-sub {
    font-size: 0.7rem;
    letter-spacing: 4px;
    opacity: 0;
    transition: opacity 0.3s;
    margin-top: 4px;
  }

  /* Status */
  #status-bar {
    position: absolute;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.65rem;
    letter-spacing: 3px;
    color: var(--cyan);
    text-transform: uppercase;
    opacity: 0.8;
    white-space: nowrap;
  }

  /* Hand detected pulse */
  #hand-indicator {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 2px solid var(--cyan);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  #hand-indicator.active {
    opacity: 1;
    animation: pulse-ring 1.2s ease-out infinite;
  }

  @keyframes pulse-ring {
    0% { transform: translate(-50%, -50%) scale(0.8); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(2.2); opacity: 0; }
  }

  /* Effect overlay for techniques */
  #effect-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }

  /* Scan line */
  .scanline {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 3px,
      rgba(0,0,0,0.07) 3px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
  }

  /* Start screen */
  #start-screen {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(10,10,46,0.97), rgba(106,13,173,0.85));
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 20px;
    text-align: center;
    padding: 24px;
  }

  .big-kanji {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(4rem, 18vw, 10rem);
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(180deg, var(--gold), var(--red));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 20px rgba(255,34,68,0.6));
    animation: flicker 3s ease-in-out infinite;
  }

  @keyframes flicker {
    0%,100% { filter: drop-shadow(0 0 20px rgba(255,34,68,0.6)); }
    50% { filter: drop-shadow(0 0 40px rgba(255,34,68,0.9)) drop-shadow(0 0 80px rgba(106,13,173,0.5)); }
  }

  .start-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.5rem, 6vw, 3rem);
    letter-spacing: 8px;
    color: var(--white);
  }

  .start-desc {
    font-size: 0.8rem;
    line-height: 1.8;
    color: rgba(240,234,248,0.7);
    max-width: 340px;
    letter-spacing: 1px;
  }

  .start-btn {
    margin-top: 10px;
    padding: 14px 48px;
    background: transparent;
    border: 2px solid var(--cyan);
    color: var(--cyan);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 6px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .start-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--cyan);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s;
    z-index: -1;
  }

  .start-btn:hover { color: var(--blue); }
  .start-btn:hover::before { transform: scaleX(1); }

  /* Canvas effects drawn in JS */
  canvas { image-rendering: pixelated; }

  /* Responsive */
  @media (max-width: 480px) {
    .power-icon { width: 44px; height: 44px; font-size: 1.3rem; }
    .power-label { font-size: 0.5rem; max-width: 56px; }
  }
</style>
</head>
<body>

<div id="start-screen">
  <div class="big-kanji">呪</div>
  <div class="start-title">Jujutsu Kaisen</div>
  <p class="start-desc">
    Ative sua câmera e desperte sua <strong>Energia Amaldiçoada</strong>.<br>
    Mostre sua mão e escolha sua técnica para liberar o poder.
  </p>
  <button class="start-btn" onclick="startCamera()">⚡ DESPERTAR</button>
</div>

<div class="main">
  <header>
    <div>
      <div class="logo">呪術廻戦</div>
      <div class="subtitle">Cursed Energy System</div>
    </div>
  </header>

  <div id="video-container">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="scanline"></div>

    <div id="overlay">
      <div class="hud-corner tl"></div>
      <div class="hud-corner tr"></div>
      <div class="hud-corner bl"></div>
      <div class="hud-corner br"></div>

      <div id="status-bar">⬤ AGUARDANDO MÃO...</div>

      <div id="technique-display">
        <div id="technique-name"></div>
        <div id="technique-sub"></div>
      </div>

      <div id="hand-indicator"></div>
      <canvas id="effect-overlay" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;"></canvas>
    </div>

    <div id="power-panel">
      <!-- Techniques -->
      <div class="power-btn" onclick="activateTechnique('infinity')">
        <div class="power-icon" style="border-color:#00f0ff;color:#00f0ff">∞</div>
        <div class="power-label">Infinito</div>
      </div>
      <div class="power-btn" onclick="activateTechnique('divergent')">
        <div class="power-icon" style="border-color:#6a0dad;color:#bf7fff">⬡</div>
        <div class="power-label">Fissura Div.</div>
      </div>
      <div class="power-btn" onclick="activateTechnique('red')">
        <div class="power-icon" style="border-color:#ff2244;color:#ff2244">◉</div>
        <div class="power-label">Red</div>
      </div>
      <div class="power-btn" onclick="activateTechnique('blue')">
        <div class="power-icon" style="border-color:#2244ff;color:#88aaff">◎</div>
        <div class="power-label">Blue</div>
      </div>
      <div class="power-btn" onclick="activateTechnique('hollow')">
        <div class="power-icon" style="border-color:#ffd700;color:#ffd700">✦</div>
        <div class="power-label">Hollow Purple</div>
      </div>
      <div class="power-btn" onclick="activateTechnique('domain')">
        <div class="power-icon" style="border-color:#ff4400;color:#ff6600">卍</div>
        <div class="power-label">Expansão</div>
      </div>
    </div>
  </div>
</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let handDetected = false;
let currentTechnique = null;
let effectActive = false;
let particles = [];
let animFrame;
let lastHandPos = { x: 0.5, y: 0.5 };

const techniques = {
  infinity: {
    name: 'INFINITO',
    sub: '無下限術式 — LIMITLESS',
    colors: ['#00f0ff', '#ffffff', '#aaddff'],
    effect: drawInfinity
  },
  divergent: {
    name: 'FISSURA DIVERGENTE',
    sub: '蒼 — BLUE LAPSE',
    colors: ['#6a0dad', '#bf7fff', '#ffffff'],
    effect: drawDivergent
  },
  red: {
    name: 'VERMELHO',
    sub: '赫 — RED LAPSE',
    colors: ['#ff2244', '#ff8800', '#ffdd00'],
    effect: drawRed
  },
  blue: {
    name: 'AZUL',
    sub: '蒼 — BLUE LAPSE',
    colors: ['#2244ff', '#88aaff', '#ffffff'],
    effect: drawBlue
  },
  hollow: {
    name: 'HOLLOW PURPLE',
    sub: '虚式「茈」— HOLLOW PURPLE',
    colors: ['#ffd700', '#ff44ff', '#6600ff'],
    effect: drawHollow
  },
  domain: {
    name: 'EXPANSÃO DO DOMÍNIO',
    sub: '領域展開 — DOMAIN EXPANSION',
    colors: ['#ff4400', '#ff6600', '#ffd700'],
    effect: drawDomain
  }
};

// ─── Camera ──────────────────────────────────────────────────────────────────
async function startCamera() {
  document.getElementById('start-screen').style.display = 'none';
  const video = document.getElementById('webcam');
  const canvas = document.getElementById('canvas');

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = stream;

    video.onloadedmetadata = () => {
      canvas.width = video.videoWidth || window.innerWidth;
      canvas.height = video.videoHeight || window.innerHeight;
      initMediaPipe(video);
    };
  } catch (e) {
    alert('Câmera não encontrada. Tente num dispositivo com câmera e permita o acesso.');
  }
}

// ─── MediaPipe ───────────────────────────────────────────────────────────────
function initMediaPipe(video) {
  const hands = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
  });

  hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.5
  });

  hands.onResults(onHandResults);

  const camera = new Camera(video, {
    onFrame: async () => { await hands.send({ image: video }); },
    width: 1280, height: 720
  });
  camera.start();

  // Start render loop
  renderLoop();
}

function onHandResults(results) {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;

  ctx.clearRect(0, 0, w, h);

  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    const landmarks = results.multiHandLandmarks[0];
    handDetected = true;

    // Average hand position (center palm)
    const palm = landmarks[9];
    lastHandPos = { x: 1 - palm.x, y: palm.y }; // mirror x

    drawHandGlow(ctx, landmarks, w, h);
    updateStatus(true);
  } else {
    handDetected = false;
    updateStatus(false);
  }
}

function drawHandGlow(ctx, landmarks, w, h) {
  const t = techniques[currentTechnique];
  const colors = t ? t.colors : ['#00f0ff', '#6a0dad'];

  // Draw cursed energy hand outline
  ctx.save();

  const points = landmarks.map(lm => ({
    x: (1 - lm.x) * w,
    y: lm.y * h
  }));

  // Connections
  const connections = [
    [0,1],[1,2],[2,3],[3,4],
    [0,5],[5,6],[6,7],[7,8],
    [5,9],[9,10],[10,11],[11,12],
    [9,13],[13,14],[14,15],[15,16],
    [13,17],[17,18],[18,19],[19,20],
    [0,17]
  ];

  const glow = colors[0];
  ctx.strokeStyle = glow;
  ctx.lineWidth = 3;
  ctx.shadowBlur = 18;
  ctx.shadowColor = glow;
  ctx.globalAlpha = 0.85;

  connections.forEach(([a, b]) => {
    ctx.beginPath();
    ctx.moveTo(points[a].x, points[a].y);
    ctx.lineTo(points[b].x, points[b].y);
    ctx.stroke();
  });

  // Joints
  points.forEach((p, i) => {
    const r = i === 0 ? 8 : 5;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fillStyle = i === 0 ? colors[1] : glow;
    ctx.shadowBlur = 20;
    ctx.shadowColor = glow;
    ctx.fill();
  });

  // Spawn particles from fingertips
  if (currentTechnique && effectActive) {
    [4, 8, 12, 16, 20].forEach(i => {
      spawnParticles(points[i].x, points[i].y, colors);
    });
  }

  ctx.restore();
}

// ─── Particles ───────────────────────────────────────────────────────────────
function spawnParticles(x, y, colors) {
  for (let i = 0; i < 3; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4,
      life: 1,
      decay: 0.03 + Math.random() * 0.04,
      size: 2 + Math.random() * 4,
      color: colors[Math.floor(Math.random() * colors.length)]
    });
  }
}

function updateParticles(ctx) {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    p.vx *= 0.96;
    p.vy *= 0.96;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life * 0.8;
    ctx.shadowBlur = 10;
    ctx.shadowColor = p.color;
    ctx.fill();
    ctx.globalAlpha = 1;
  });
}

// ─── Effect canvas render loop ────────────────────────────────────────────────
function renderLoop() {
  const ec = document.getElementById('effect-overlay');
  ec.width = window.innerWidth;
  ec.height = window.innerHeight;
  const ctx2 = ec.getContext('2d');

  function loop() {
    ctx2.clearRect(0, 0, ec.width, ec.height);
    if (effectActive && currentTechnique) {
      const t = techniques[currentTechnique];
      t.effect(ctx2, ec.width, ec.height, Date.now());
    }
    updateParticles(ctx2);
    animFrame = requestAnimationFrame(loop);
  }
  loop();
}

// ─── Status ───────────────────────────────────────────────────────────────────
function updateStatus(detected) {
  const s = document.getElementById('status-bar');
  const hi = document.getElementById('hand-indicator');
  if (detected) {
    s.textContent = '⬤ MÃO DETECTADA — ENERGIA AMALDIÇOADA ATIVA';
    s.style.color = '#00f0ff';
    hi.classList.add('active');
  } else {
    s.textContent = '⬤ AGUARDANDO MÃO...';
    s.style.color = 'rgba(0,240,255,0.5)';
    hi.classList.remove('active');
  }
}

// ─── Technique activation ─────────────────────────────────────────────────────
function activateTechnique(name) {
  currentTechnique = name;
  effectActive = true;
  const t = techniques[name];

  const tn = document.getElementById('technique-name');
  const ts = document.getElementById('technique-sub');

  tn.textContent = t.name;
  tn.style.color = t.colors[0];
  tn.style.textShadow = `0 0 30px ${t.colors[0]}, 0 0 60px ${t.colors[0]}`;
  tn.style.opacity = 1;
  ts.textContent = t.sub;
  ts.style.color = t.colors[1] || t.colors[0];
  ts.style.opacity = 1;

  // Auto fade after 4s
  clearTimeout(window._techTimer);
  window._techTimer = setTimeout(() => {
    tn.style.opacity = 0;
    ts.style.opacity = 0;
    effectActive = false;
  }, 4000);

  // Screen flash
  flashScreen(t.colors[0]);
}

function flashScreen(color) {
  const flash = document.createElement('div');
  flash.style.cssText = `position:fixed;inset:0;background:${color};opacity:0.3;z-index:999;pointer-events:none;transition:opacity 0.5s`;
  document.body.appendChild(flash);
  setTimeout(() => { flash.style.opacity = 0; setTimeout(() => flash.remove(), 600); }, 50);
}

// ─── Effect Drawers ───────────────────────────────────────────────────────────
let _t = 0;

function drawInfinity(ctx, w, h, time) {
  _t = time * 0.001;
  const cx = lastHandPos.x * w;
  const cy = lastHandPos.y * h;

  // Infinity symbol rings
  for (let i = 0; i < 5; i++) {
    const r = 40 + i * 30 + Math.sin(_t * 2 + i) * 10;
    const alpha = 0.15 - i * 0.025;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = '#00f0ff';
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = alpha + 0.05;
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#00f0ff';
    ctx.stroke();
  }

  // Rotating lines
  for (let i = 0; i < 8; i++) {
    const angle = (_t * 0.5) + (i / 8) * Math.PI * 2;
    const len = 80 + Math.sin(_t + i) * 20;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(angle) * len, cy + Math.sin(angle) * len);
    ctx.strokeStyle = '#ffffff';
    ctx.globalAlpha = 0.08;
    ctx.lineWidth = 1;
    ctx.shadowBlur = 5;
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawDivergent(ctx, w, h, time) {
  const t = time * 0.001;
  const cx = lastHandPos.x * w;
  const cy = lastHandPos.y * h;

  // Hexagonal grid emanating
  for (let i = 0; i < 6; i++) {
    const angle = (i / 6) * Math.PI * 2 + t;
    const dist = 50 + (t * 30) % 120;
    const x = cx + Math.cos(angle) * dist;
    const y = cy + Math.sin(angle) * dist;
    ctx.beginPath();
    for (let j = 0; j < 6; j++) {
      const a2 = (j / 6) * Math.PI * 2;
      const px = x + Math.cos(a2) * 20;
      const py = y + Math.sin(a2) * 20;
      j === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.strokeStyle = '#6a0dad';
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = 0.5;
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#bf7fff';
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawRed(ctx, w, h, time) {
  const t = time * 0.001;
  const cx = lastHandPos.x * w;
  const cy = lastHandPos.y * h;

  // Repulsion shockwaves
  const ring = (t * 80) % 200;
  ctx.beginPath();
  ctx.arc(cx, cy, ring, 0, Math.PI * 2);
  ctx.strokeStyle = '#ff2244';
  ctx.lineWidth = 3;
  ctx.globalAlpha = Math.max(0, 1 - ring / 200);
  ctx.shadowBlur = 25;
  ctx.shadowColor = '#ff2244';
  ctx.stroke();

  // Inner fire
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 60);
  grad.addColorStop(0, 'rgba(255,200,0,0.4)');
  grad.addColorStop(0.5, 'rgba(255,34,68,0.2)');
  grad.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(cx, cy, 60, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.globalAlpha = 0.6;
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawBlue(ctx, w, h, time) {
  const t = time * 0.001;
  const cx = lastHandPos.x * w;
  const cy = lastHandPos.y * h;

  // Attraction vortex
  for (let i = 0; i < 24; i++) {
    const angle = (i / 24) * Math.PI * 2 - t * 2;
    const r = 30 + Math.sin(t * 3 + i) * 10;
    const px = cx + Math.cos(angle) * r;
    const py = cy + Math.sin(angle) * r;
    ctx.beginPath();
    ctx.arc(px, py, 2, 0, Math.PI * 2);
    ctx.fillStyle = '#88aaff';
    ctx.globalAlpha = 0.7;
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#2244ff';
    ctx.fill();
  }

  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 70);
  grad.addColorStop(0, 'rgba(34,68,255,0.35)');
  grad.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(cx, cy, 70, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.globalAlpha = 0.5;
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawHollow(ctx, w, h, time) {
  const t = time * 0.001;
  const cx = lastHandPos.x * w;
  const cy = lastHandPos.y * h;

  // Purple converging orb
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 100 + Math.sin(t * 4) * 20);
  grad.addColorStop(0, 'rgba(255,255,255,0.9)');
  grad.addColorStop(0.2, 'rgba(255,200,0,0.7)');
  grad.addColorStop(0.5, 'rgba(150,0,255,0.5)');
  grad.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(cx, cy, 120, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.globalAlpha = 0.7;
  ctx.shadowBlur = 40;
  ctx.shadowColor = '#cc00ff';
  ctx.fill();

  // Orbiting red+blue
  [-1, 1].forEach((dir, idx) => {
    const a = t * 3 * dir;
    const ox = cx + Math.cos(a) * 50;
    const oy = cy + Math.sin(a) * 50;
    const colors = ['#ff2244', '#2244ff'];
    const grad2 = ctx.createRadialGradient(ox, oy, 0, ox, oy, 20);
    grad2.addColorStop(0, colors[idx]);
    grad2.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(ox, oy, 20, 0, Math.PI * 2);
    ctx.fillStyle = grad2;
    ctx.globalAlpha = 0.8;
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawDomain(ctx, w, h, time) {
  const t = time * 0.001;

  // Full screen dark vignette with runes
  const vig = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w,h)*0.7);
  vig.addColorStop(0, 'transparent');
  vig.addColorStop(1, 'rgba(10,10,46,0.75)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, w, h);

  // Rotating circle border
  ctx.save();
  ctx.translate(w/2, h/2);
  ctx.rotate(t * 0.3);
  const R = Math.min(w, h) * 0.42;
  ctx.beginPath();
  ctx.arc(0, 0, R, 0, Math.PI * 2);
  ctx.strokeStyle = '#ff4400';
  ctx.lineWidth = 3;
  ctx.globalAlpha = 0.6;
  ctx.shadowBlur = 30;
  ctx.shadowColor = '#ff4400';
  ctx.stroke();

  // Rune marks
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2;
    ctx.save();
    ctx.rotate(a);
    ctx.translate(R, 0);
    ctx.fillStyle = '#ffd700';
    ctx.font = `${18 + Math.sin(t*2+i)*3}px 'Noto Serif JP'`;
    ctx.globalAlpha = 0.8;
    ctx.fillText(['呪','術','廻','戦','領','域','展','開','赫','蒼','紫','∞'][i], -9, 6);
    ctx.restore();
  }
  ctx.restore();

  // Hand glow at center of hand
  const cx = lastHandPos.x * w;
  const cy = lastHandPos.y * h;
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, 60);
  g.addColorStop(0, 'rgba(255,100,0,0.6)');
  g.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(cx, cy, 60, 0, Math.PI * 2);
  ctx.fillStyle = g;
  ctx.globalAlpha = 0.8;
  ctx.fill();
  ctx.globalAlpha = 1;
}

// Resize effect canvas
window.addEventListener('resize', () => {
  const ec = document.getElementById('effect-overlay');
  ec.width = window.innerWidth;
  ec.height = window.innerHeight;
});
</script>
