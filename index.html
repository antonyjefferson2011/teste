<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Libras Tracker - Reconhecimento de Letras</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            filter: brightness(0.9);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            pointer-events: none;
        }

        /* Painel da letra reconhecida */
        .letter-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 30px 50px;
            text-align: center;
            z-index: 20;
            border: 2px solid #00ffcc;
            box-shadow: 0 0 50px rgba(0, 255, 204, 0.3);
            pointer-events: none;
        }

        .letter-label {
            font-size: 14px;
            color: #00ffcc;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .letter-value {
            font-size: 120px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 20px #00ffcc;
            line-height: 1;
        }

        .gesture-name {
            font-size: 16px;
            color: rgba(255,255,255,0.7);
            margin-top: 10px;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-family: monospace;
            z-index: 10;
            border-left: 3px solid #00ffcc;
            pointer-events: none;
        }

        .info span {
            color: #00ffcc;
            font-weight: bold;
        }

        .fps-counter {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            padding: 8px 15px;
            border-radius: 8px;
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            z-index: 10;
        }

        .start-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s;
        }

        .start-btn {
            background: linear-gradient(135deg, #00ffcc, #0066ff);
            border: none;
            color: white;
            padding: 18px 48px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .start-btn:hover {
            transform: scale(1.05);
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }

        @media (max-width: 768px) {
            .letter-value { font-size: 80px; }
            .letter-panel { padding: 20px 40px; }
        }
    </style>
</head>
<body>

<div id="startPanel" class="start-panel">
    <button class="start-btn" id="startButton">🤟 ATIVAR CÂMERA</button>
</div>

<div class="container">
    <video id="inputVideo" autoplay playsinline muted></video>
    <canvas id="outputCanvas"></canvas>
</div>

<div class="letter-panel" id="letterPanel">
    <div class="letter-label">LETRA RECONHECIDA</div>
    <div class="letter-value" id="recognizedLetter">?</div>
    <div class="gesture-name" id="gestureName">Aguardando mão...</div>
</div>

<div class="info">
    🤟 MÃOS: <span id="handCount">0</span>
</div>

<div class="fps-counter">
    FPS: <span id="fpsValue">0</span>
</div>

<script>
    const videoElement = document.getElementById('inputVideo');
    const canvasElement = document.getElementById('outputCanvas');
    const ctx = canvasElement.getContext('2d');
    const startPanel = document.getElementById('startPanel');
    const startButton = document.getElementById('startButton');
    const handCountSpan = document.getElementById('handCount');
    const fpsValueSpan = document.getElementById('fpsValue');
    const recognizedLetterSpan = document.getElementById('recognizedLetter');
    const gestureNameSpan = document.getElementById('gestureName');

    let width = window.innerWidth;
    let height = window.innerHeight;
    let frameCount = 0;
    let lastFpsUpdate = performance.now();
    let lastLetter = '?';
    let stabilityCounter = 0;

    function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvasElement.width = width;
        canvasElement.height = height;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // CORES para desenho
    const handColors = ['rgba(0, 255, 200, 0.9)', 'rgba(255, 100, 200, 0.9)'];

    // ============================================
    // LÓGICA DE RECONHECIMENTO DE LIBRAS
    // ============================================
    
    // Verifica se um dedo está esticado (ponta acima da base)
    function isFingerUp(landmarks, tipIdx, baseIdx) {
        if (!landmarks[tipIdx] || !landmarks[baseIdx]) return false;
        // Considera que a mão está com palma para a câmera
        // Dedo está esticado se a ponta está acima da base (menor Y)
        return landmarks[tipIdx].y < landmarks[baseIdx].y;
    }

    // Distância entre dois pontos
    function getDistance(p1, p2) {
        return Math.hypot(p1.x - p2.x, p1.y - p2.y);
    }

    // Reconhece a letra baseado nas posições dos dedos
    function recognizeLibrasLetter(landmarks) {
        if (!landmarks || landmarks.length < 21) return { letter: '?', name: 'Mão não detectada' };

        // Índices dos dedos (MediaPipe)
        // Polegar: 4, Indicador: 8, Médio: 12, Anelar: 16, Mindinho: 20
        const THUMB_TIP = 4;
        const THUMB_CMC = 1;
        const INDEX_TIP = 8;
        const INDEX_MCP = 5;
        const MIDDLE_TIP = 12;
        const MIDDLE_MCP = 9;
        const RING_TIP = 16;
        const RING_MCP = 13;
        const PINKY_TIP = 20;
        const PINKY_MCP = 17;

        // Verifica quais dedos estão esticados
        const indexUp = isFingerUp(landmarks, INDEX_TIP, INDEX_MCP);
        const middleUp = isFingerUp(landmarks, MIDDLE_TIP, MIDDLE_MCP);
        const ringUp = isFingerUp(landmarks, RING_TIP, RING_MCP);
        const pinkyUp = isFingerUp(landmarks, PINKY_TIP, PINKY_MCP);
        const thumbUp = isFingerUp(landmarks, THUMB_TIP, THUMB_CMC);

        // Distâncias importantes
        const thumbIndexDist = getDistance(landmarks[THUMB_TIP], landmarks[INDEX_TIP]);
        const thumbMiddleDist = getDistance(landmarks[THUMB_TIP], landmarks[MIDDLE_TIP]);
        const indexMiddleDist = getDistance(landmarks[INDEX_TIP], landmarks[MIDDLE_TIP]);
        
        const fingersUp = [indexUp, middleUp, ringUp, pinkyUp];
        const upCount = fingersUp.filter(f => f).length;

        // REGRAS DAS LETRAS EM LIBRAS
        
        // Letra A: mão fechada, polegar sobre os dedos
        if (upCount === 0 && thumbUp === false) {
            return { letter: 'A', name: 'Mão fechada' };
        }
        
        // Letra B: todos os dedos esticados e juntos
        if (upCount === 4 && thumbUp && indexMiddleDist < 0.05) {
            return { letter: 'B', name: 'Palma aberta' };
        }
        
        // Letra C: mão em formato de C (polegar e médio formando arco)
        if (thumbMiddleDist < 0.08 && thumbMiddleDist > 0.02 && !indexUp && !middleUp && !ringUp && !pinkyUp) {
            return { letter: 'C', name: 'Forma de C' };
        }
        
        // Letra D: só indicador esticado
        if (indexUp && !middleUp && !ringUp && !pinkyUp && !thumbUp) {
            return { letter: 'D', name: 'Indicador esticado' };
        }
        
        // Letra E: mão fechada com polegar sobre os outros
        if (upCount === 0 && thumbUp === false && thumbIndexDist < 0.05) {
            return { letter: 'E', name: 'Mão fechada com polegar' };
        }
        
        // Letra F: indicador e polegar se tocando
        if (thumbIndexDist < 0.04 && !middleUp && !ringUp && !pinkyUp) {
            return { letter: 'F', name: 'Polegar e indicador juntos' };
        }
        
        // Letra I: só mindinho esticado
        if (pinkyUp && !indexUp && !middleUp && !ringUp && !thumbUp) {
            return { letter: 'I', name: 'Mindinho esticado' };
        }
        
        // Letra L: polegar e indicador em L
        if (thumbUp && indexUp && !middleUp && !ringUp && !pinkyUp) {
            return { letter: 'L', name: 'Polegar e indicador em L' };
        }
        
        // Letra O: indicador e polegar formando círculo
        if (thumbIndexDist > 0.03 && thumbIndexDist < 0.08 && !middleUp && !ringUp && !pinkyUp) {
            return { letter: 'O', name: 'Círculo com dedos' };
        }
        
        // Letra R: indicador e médio cruzados/sobrepostos
        if (indexUp && middleUp && !ringUp && !pinkyUp && indexMiddleDist < 0.04) {
            return { letter: 'R', name: 'Dois dedos juntos' };
        }
        
        // Letra U: indicador e médio juntos pra cima
        if (indexUp && middleUp && !ringUp && !pinkyUp && indexMiddleDist < 0.03) {
            return { letter: 'U', name: 'Indicador e médio unidos' };
        }
        
        // Letra V: indicador e médio em V (separados)
        if (indexUp && middleUp && !ringUp && !pinkyUp && indexMiddleDist > 0.05) {
            return { letter: 'V', name: 'V com dois dedos' };
        }
        
        // Letra Y: polegar e mindinho esticados
        if (thumbUp && pinkyUp && !indexUp && !middleUp && !ringUp) {
            return { letter: 'Y', name: 'Polegar e mindinho' };
        }
        
        // Letra S: similar ao A
        if (upCount === 0) {
            return { letter: 'S', name: 'Mão fechada' };
        }
        
        // Letra T: polegar entre indicador e médio
        if (thumbUp && !indexUp && !middleUp && !ringUp && !pinkyUp) {
            return { letter: 'T', name: 'Polegar levantado' };
        }

        // Reconhecimento de números também
        if (upCount === 1 && indexUp) return { letter: '1', name: 'Número 1' };
        if (upCount === 2 && indexUp && middleUp) return { letter: '2', name: 'Número 2' };
        if (upCount === 3 && indexUp && middleUp && ringUp) return { letter: '3', name: 'Número 3' };
        if (upCount === 4) return { letter: '4', name: 'Número 4' };
        
        // Gestos padrão
        if (upCount === 0) return { letter: '✊', name: 'Punho' };
        if (upCount === 5) return { letter: '🖐️', name: 'Mão aberta' };
        
        return { letter: '?', name: 'Gesto não reconhecido' };
    }

    // Desenha as mãos na tela
    function drawHands(landmarks) {
        if (!landmarks || landmarks.length === 0) {
            ctx.clearRect(0, 0, width, height);
            return;
        }
        
        ctx.clearRect(0, 0, width, height);
        
        landmarks.forEach((hand, handIndex) => {
            const color = handColors[handIndex % handColors.length];
            
            // Desenha as conexões
            for (const connection of HAND_CONNECTIONS) {
                const start = hand[connection[0]];
                const end = hand[connection[1]];
                if (start && end) {
                    ctx.beginPath();
                    ctx.moveTo(start.x * width, start.y * height);
                    ctx.lineTo(end.x * width, end.y * height);
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 2.5;
                    ctx.stroke();
                }
            }
            
            // Desenha os pontos
            for (let i = 0; i < hand.length; i++) {
                const x = hand[i].x * width;
                const y = hand[i].y * height;
                const isTip = [4, 8, 12, 16, 20].includes(i);
                const radius = isTip ? 5 : 2.5;
                
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, 2 * Math.PI);
                ctx.fillStyle = isTip ? '#ffffff' : color;
                ctx.fill();
            }
        });
    }

    // Atualiza a UI com a letra reconhecida
    function updateLetterDisplay(letter, gestureName) {
        if (letter !== lastLetter) {
            stabilityCounter++;
            if (stabilityCounter > 3) { // Estabiliza para não ficar piscando
                lastLetter = letter;
                recognizedLetterSpan.textContent = letter;
                gestureNameSpan.textContent = gestureName;
                stabilityCounter = 0;
            }
        } else {
            stabilityCounter = 0;
        }
    }

    // Loop de FPS
    function updateFPS() {
        frameCount++;
        const now = performance.now();
        if (now - lastFpsUpdate >= 1000) {
            fpsValueSpan.textContent = frameCount;
            frameCount = 0;
            lastFpsUpdate = now;
        }
    }

    // Inicialização do MediaPipe
    function initHandTracking() {
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,  // Só precisa de 1 mão para Libras
            modelComplexity: 0,  // Mais leve
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                drawHands(results.multiHandLandmarks);
                
                // Reconhece a letra da primeira mão
                const result = recognizeLibrasLetter(hand);
                updateLetterDisplay(result.letter, result.name);
                handCountSpan.textContent = results.multiHandLandmarks.length;
            } else {
                ctx.clearRect(0, 0, width, height);
                handCountSpan.textContent = 0;
                updateLetterDisplay('?', 'Nenhuma mão detectada');
            }
            updateFPS();
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => await hands.send({ image: videoElement }),
            width: 640,
            height: 480,
            facingMode: 'user'
        });
        
        camera.start();
    }

    // Evento de início
    startButton.addEventListener('click', async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            videoElement.srcObject = stream;
            await new Promise(resolve => videoElement.onloadedmetadata = resolve);
            initHandTracking();
            startPanel.classList.add('hidden');
        } catch (error) {
            alert('Erro ao acessar câmera. Verifique as permissões.');
        }
    });
</script>
</body>
</html>
